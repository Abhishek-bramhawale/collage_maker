<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Character Collage Generator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#111;
      color:white;
      padding:20px;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:#1d1d1d;
      border-radius:14px;
      padding:15px;
      border:2px solid #2e2e2e;
    }

    .drop-area{
      width:100%;
      height:220px;
      border:2px dashed #555;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      cursor:pointer;
      overflow:hidden;
      position:relative;
      background:#222;
    }

    .drop-area img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .drop-area.dragover{
      border-color:#00bfff;
      background:#2a2a2a;
    }

    .controls{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    input[type="checkbox"]{
      width:18px;
      height:18px;
    }

    button{
      padding:12px 22px;
      border:none;
      border-radius:10px;
      background:#00bfff;
      color:white;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      margin-top:15px;
    }

    button:hover{
      opacity:0.9;
    }

    .center{
      text-align:center;
    }

    .canvas-wrapper{
      margin-top:30px;
      display:flex;
      justify-content:center;
    }

    canvas{
      width:100%;
      max-width:900px;
      aspect-ratio:16/9;
      border-radius:12px;
      background:black;
      border:3px solid #333;
    }

    .download-btn{
      display:none;
      margin-top:15px;
    }

  </style>
</head>
<body>

  <h1>16:9 Character Collage Generator</h1>

  <div class="cards">

    <!-- CARD 1 -->
    <div class="card">
      <div class="drop-area" data-index="0">
        <span>Drag & Drop<br>or Click</span>
      </div>

      <div class="controls">
        <label>Select</label>
        <input type="checkbox" class="select-box">
      </div>
    </div>

    <!-- CARD 2 -->
    <div class="card">
      <div class="drop-area" data-index="1">
        <span>Drag & Drop<br>or Click</span>
      </div>

      <div class="controls">
        <label>Select</label>
        <input type="checkbox" class="select-box">
      </div>
    </div>

    <!-- CARD 3 -->
    <div class="card">
      <div class="drop-area" data-index="2">
        <span>Drag & Drop<br>or Click</span>
      </div>

      <div class="controls">
        <label>Select</label>
        <input type="checkbox" class="select-box">
      </div>
    </div>

    <!-- CARD 4 -->
    <div class="card">
      <div class="drop-area" data-index="3">
        <span>Drag & Drop<br>or Click</span>
      </div>

      <div class="controls">
        <label>Select</label>
        <input type="checkbox" class="select-box">
      </div>
    </div>

  </div>

  <div class="center">
    <button id="generateBtn">Generate 16:9 Collage</button>
  </div>

  <div class="canvas-wrapper">
    <canvas id="canvas" width="1600" height="900"></canvas>
  </div>

  <div class="center">
    <button class="download-btn" id="downloadBtn">Download Image</button>
  </div>

  <script>
    const dropAreas = document.querySelectorAll(".drop-area");
    const checkboxes = document.querySelectorAll(".select-box");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const generateBtn = document.getElementById("generateBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    const images = [null, null, null, null];

    dropAreas.forEach((area, index) => {

      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";
      input.hidden = true;
      area.appendChild(input);

      area.addEventListener("click", () => input.click());

      input.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if(file) loadImage(file, area, index);
      });

      area.addEventListener("dragover", (e) => {
        e.preventDefault();
        area.classList.add("dragover");
      });

      area.addEventListener("dragleave", () => {
        area.classList.remove("dragover");
      });

      area.addEventListener("drop", (e) => {
        e.preventDefault();
        area.classList.remove("dragover");

        const file = e.dataTransfer.files[0];
        if(file) loadImage(file, area, index);
      });

    });

    function loadImage(file, area, index){
      const reader = new FileReader();

      reader.onload = function(e){
        const img = new Image();

        img.onload = () => {
          images[index] = img;

          area.innerHTML = "";
          area.appendChild(img);
        };

        img.src = e.target.result;
      };

      reader.readAsDataURL(file);
    }

    generateBtn.addEventListener("click", () => {

      const selectedImages = [];

      checkboxes.forEach((box, index) => {
        if(box.checked && images[index]){
          selectedImages.push(images[index]);
        }
      });

      if(selectedImages.length === 0){
        alert("Select at least one image.");
        return;
      }

      ctx.clearRect(0,0,canvas.width,canvas.height);

      const currentLayout = verticalColumnLayout(
        selectedImages.length,
        canvas.width,
        canvas.height
      );

      selectedImages.forEach((img, i) => {

        const box = currentLayout[i];

        drawCoverImage(
          ctx,
          img,
          box.x,
          box.y,
          box.w,
          box.h
        );

      });

      downloadBtn.style.display = "inline-block";

    });

    function verticalColumnLayout(count, canvasW, canvasH){
      const boxes = [];
      let x = 0;
      const colW = Math.floor(canvasW / count);

      for(let i = 0; i < count; i++){
        const w = (i === count - 1) ? canvasW - x : colW;
        boxes.push({ x, y: 0, w, h: canvasH });
        x += w;
      }

      return boxes;
    }

    function drawCoverImage(ctx, img, x, y, w, h){

      ctx.save();
      ctx.beginPath();
      ctx.rect(x, y, w, h);
      ctx.clip();

      const imgRatio = img.width / img.height;
      const boxRatio = w / h;

      let drawWidth, drawHeight, offsetX, offsetY;

      if(imgRatio > boxRatio){
        drawHeight = h;
        drawWidth = h * imgRatio;
        offsetX = x - (drawWidth - w)/2;
        offsetY = y;
      } else {
        drawWidth = w;
        drawHeight = w / imgRatio;
        offsetX = x;
        offsetY = y - (drawHeight - h)/2;
      }

      ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
      ctx.restore();
    }

    downloadBtn.addEventListener("click", () => {

      const link = document.createElement("a");
      link.download = "collage-16x9.png";
      link.href = canvas.toDataURL("image/png");
      link.click();

    });

  </script>

</body>
</html>
